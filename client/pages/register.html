<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dang ky — VuaHoanTien</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-4);
      background:
        radial-gradient(circle at 20% 30%, rgba(91, 231, 196, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(124, 140, 255, 0.06) 0%, transparent 50%),
        var(--bg-canvas);
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: var(--space-10);
      animation: scaleIn var(--motion-slow) var(--ease-spring);
    }
    .auth-logo {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: var(--weight-bold);
      background: var(--gradient-hero);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: var(--space-2);
    }
    .auth-subtitle {
      text-align: center;
      font-size: var(--size-caption);
      color: var(--text-muted);
      margin-bottom: var(--space-8);
      line-height: 1.6;
    }
    .auth-form .form-group {
      margin-bottom: var(--space-5);
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--size-caption);
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--brand-primary);
      font-weight: var(--weight-semibold);
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-6) 0;
      color: var(--text-muted);
      font-size: var(--size-small);
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }
    .password-strength {
      display: flex;
      gap: var(--space-1);
      margin-top: var(--space-2);
    }
    .password-strength .bar {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border-soft);
      transition: background var(--motion-fast);
    }
    .password-strength .bar.weak { background: var(--state-danger); }
    .password-strength .bar.medium { background: var(--state-warning); }
    .password-strength .bar.strong { background: var(--state-success); }
    .strength-text {
      font-size: var(--size-small);
      margin-top: var(--space-1);
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card animate-fade-in-up">

      <!-- Logo -->
      <a href="index.html" class="auth-logo" style="display: block; text-decoration: none;">VuaHoanTien</a>
      <p class="auth-subtitle">Tao tai khoan de luu don hang va rut tien ve vi cua ban</p>

      <!-- Register Form -->
      <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">

        <div class="form-group">
          <label class="form-label">Ho va ten</label>
          <input class="form-input" type="text" placeholder="Nguyen Van A" data-required autocomplete="name">
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="reg-email" placeholder="email@example.com" data-required autocomplete="email">
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Mat khau</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Toi thieu 8 ky tu" data-required data-minlength="8" autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
          <div class="password-strength">
            <div class="bar" id="str-bar-1"></div>
            <div class="bar" id="str-bar-2"></div>
            <div class="bar" id="str-bar-3"></div>
            <div class="bar" id="str-bar-4"></div>
          </div>
          <span class="strength-text text-muted" id="strength-text"></span>
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Xac nhan mat khau</label>
          <input class="form-input" type="password" placeholder="Nhap lai mat khau" data-required data-match="#reg-password" autocomplete="new-password">
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" id="terms-check" data-required>
            <span>Toi dong y voi <a href="#" style="color: var(--brand-primary);">dieu khoan su dung</a> va <a href="#" style="color: var(--brand-primary);">chinh sach bao mat</a></span>
          </label>
          <span class="form-error"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-pill w-full" style="margin-top: var(--space-4);">
          Tao tai khoan
        </button>
      </form>

      <div class="auth-divider">hoac</div>

      <!-- Social Login Buttons -->
      <div style="display: flex; flex-direction: column; gap: var(--space-3);">
        <button class="btn btn-secondary btn-lg btn-pill w-full" onclick="VHT.toast('Tinh nang dang phat trien', 'info')">
          &#127312; Dang ky voi Google
        </button>
      </div>

      <!-- Footer Link -->
      <div class="auth-footer">
        Da co tai khoan? <a href="login.html">Dang nhap</a>
      </div>

    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    function checkPasswordStrength(password) {
      const bars = [
        document.getElementById('str-bar-1'),
        document.getElementById('str-bar-2'),
        document.getElementById('str-bar-3'),
        document.getElementById('str-bar-4')
      ];
      const textEl = document.getElementById('strength-text');
      
      // Reset
      bars.forEach(b => b.className = 'bar');
      textEl.textContent = '';
      textEl.className = 'strength-text';

      if (!password) return;

      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
      if (/\d/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      const levels = [
        { max: 1, cls: 'weak', text: 'Yeu', color: 'var(--state-danger)' },
        { max: 2, cls: 'weak', text: 'Yeu', color: 'var(--state-danger)' },
        { max: 3, cls: 'medium', text: 'Trung binh', color: 'var(--state-warning)' },
        { max: 4, cls: 'strong', text: 'Manh', color: 'var(--state-success)' },
        { max: 5, cls: 'strong', text: 'Rat manh', color: 'var(--state-success)' }
      ];

      const level = levels[Math.min(score, 4)];
      const fillCount = score <= 1 ? 1 : score <= 2 ? 2 : score <= 3 ? 3 : 4;

      for (let i = 0; i < fillCount; i++) {
        bars[i].classList.add(level.cls);
      }

      textEl.textContent = level.text;
      textEl.style.color = level.color;
    }

    function handleRegister(e) {
      e.preventDefault();
      const form = document.getElementById('register-form');
      
      if (!VHT.validateForm(form)) {
        VHT.toast('Vui long kiem tra lai thong tin', 'error');
        return;
      }

      // Check terms
      const termsCheck = document.getElementById('terms-check');
      if (!termsCheck.checked) {
        VHT.toast('Vui long dong y dieu khoan su dung', 'warning');
        return;
      }

      // Simulate registration
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '&#8987; Dang tao tai khoan...';

      setTimeout(() => {
        localStorage.setItem('vht_logged_in', 'true');
        VHT.toast('Dang ky thanh cong! Chao mung ban!', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      }, 1500);
    }
  </script>
</body>
</html>
